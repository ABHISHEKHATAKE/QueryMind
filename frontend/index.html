<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>QueryMind — E-Commerce AI Analyst</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0d0f14;
    --bg2:      #13161e;
    --bg3:      #1a1e2a;
    --border:   #252a38;
    --accent:   #6366f1;
    --accent2:  #06b6d4;
    --green:    #10b981;
    --amber:    #f59e0b;
    --red:      #ef4444;
    --text:     #e2e8f0;
    --muted:    #64748b;
    --mono:     'Space Mono', monospace;
    --sans:     'DM Sans', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg2);
  }
  .logo {
    font-family: var(--mono);
    font-size: 18px;
    color: var(--accent);
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--accent2); }
  .header-badge {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--green);
    border: 1px solid var(--green);
    border-radius: 4px;
    padding: 3px 8px;
    opacity: 0.8;
  }

  /* ── Layout ── */
  .layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  aside {
    border-right: 1px solid var(--border);
    background: var(--bg2);
    padding: 24px 16px;
    overflow-y: auto;
  }
  .aside-title {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 14px;
    padding-left: 4px;
  }
  .sample-btn {
    display: block;
    width: 100%;
    text-align: left;
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    padding: 10px 12px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.15s;
    line-height: 1.4;
  }
  .sample-btn:hover {
    border-color: var(--accent);
    background: rgba(99,102,241,0.08);
    color: #fff;
  }
  .eval-toggle-wrap {
    margin-top: 24px;
    padding: 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--bg3);
  }
  .eval-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    display: block;
    margin-bottom: 10px;
  }
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
    color: var(--text);
  }
  .toggle {
    position: relative;
    width: 36px; height: 20px;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .slider-t {
    position: absolute;
    inset: 0;
    background: var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
  }
  .slider-t::before {
    content: '';
    position: absolute;
    width: 14px; height: 14px;
    left: 3px; top: 3px;
    background: #fff;
    border-radius: 50%;
    transition: 0.2s;
  }
  .toggle input:checked + .slider-t { background: var(--accent); }
  .toggle input:checked + .slider-t::before { transform: translateX(16px); }

  /* ── Main ── */
  main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Query bar ── */
  .query-bar {
    padding: 20px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
  }
  .input-wrap {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .input-wrap input {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-wrap input:focus { border-color: var(--accent); }
  .input-wrap input::placeholder { color: var(--muted); }
  .ask-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: var(--sans);
    font-weight: 600;
    font-size: 14px;
    padding: 12px 22px;
    cursor: pointer;
    transition: opacity 0.2s;
    white-space: nowrap;
  }
  .ask-btn:hover { opacity: 0.88; }
  .ask-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Results ── */
  .results {
    flex: 1;
    overflow-y: auto;
    padding: 24px 28px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  /* ── Empty state ── */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    opacity: 0.4;
    user-select: none;
  }
  .empty-icon {
    font-size: 48px;
    font-family: var(--mono);
    color: var(--accent);
  }
  .empty-text { font-size: 14px; color: var(--muted); font-family: var(--mono); }

  /* ── Cards ── */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .card-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg3);
  }
  .card-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }
  .card-title {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .card-body { padding: 16px; }

  /* ── Answer card ── */
  .answer-text {
    font-size: 15px;
    line-height: 1.7;
    color: var(--text);
  }

  /* ── SQL card ── */
  .sql-code {
    font-family: var(--mono);
    font-size: 13px;
    color: #a5b4fc;
    background: var(--bg);
    border-radius: 8px;
    padding: 14px 16px;
    overflow-x: auto;
    white-space: pre-wrap;
    line-height: 1.6;
  }

  /* ── Clarification card ── */
  .clarify-text {
    font-size: 14px;
    color: var(--amber);
    line-height: 1.6;
    margin-bottom: 12px;
  }
  .clarify-input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--amber);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    margin-bottom: 10px;
  }
  .clarify-submit {
    background: var(--amber);
    color: #000;
    border: none;
    border-radius: 8px;
    font-weight: 600;
    font-size: 13px;
    padding: 9px 18px;
    cursor: pointer;
  }

  /* ── Chart card ── */
  .chart-wrap {
    position: relative;
    height: 300px;
  }

  /* ── Table ── */
  .result-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    font-family: var(--mono);
  }
  .result-table th {
    text-align: left;
    padding: 8px 12px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .result-table td {
    padding: 8px 12px;
    border-bottom: 1px solid rgba(37,42,56,0.5);
    color: var(--text);
  }
  .result-table tr:last-child td { border-bottom: none; }
  .result-table tr:hover td { background: rgba(99,102,241,0.05); }

  /* ── RAGAS scores ── */
  .eval-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
  }
  .eval-metric {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    text-align: center;
  }
  .eval-metric-name {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }
  .eval-score {
    font-family: var(--mono);
    font-size: 26px;
    font-weight: 700;
  }
  .score-high { color: var(--green); }
  .score-mid  { color: var(--amber); }
  .score-low  { color: var(--red); }

  /* ── Loader ── */
  .loader {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 20px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
  }
  .dots span {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    margin-right: 4px;
    animation: bounce 1s infinite;
  }
  .dots span:nth-child(2) { animation-delay: 0.15s; }
  .dots span:nth-child(3) { animation-delay: 0.30s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">Query<span>Mind</span></div>
  <div class="header-badge">● LIVE</div>
</header>

<div class="layout">

  <!-- Sidebar -->
  <aside>
    <div class="aside-title">Sample Questions</div>
    <div id="sampleList">
      <div style="color:var(--muted);font-size:13px">Loading...</div>
    </div>

    <div class="eval-toggle-wrap">
      <span class="eval-label">RAGAS Evaluation</span>
      <div class="toggle-row">
        <span>Enable scoring</span>
        <label class="toggle">
          <input type="checkbox" id="evalToggle">
          <span class="slider-t"></span>
        </label>
      </div>
      <div style="font-size:12px;color:var(--muted);margin-top:8px;line-height:1.5">
        Measures faithfulness, relevancy & context precision.
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main>
    <div class="query-bar">
      <div class="input-wrap">
        <input type="text" id="queryInput" placeholder="Ask anything about your e-commerce data..."/>
        <button class="ask-btn" id="askBtn" onclick="submitQuery()">Ask →</button>
      </div>
    </div>

    <div class="results" id="results">
      <div class="empty-state">
        <div class="empty-icon">_</div>
        <div class="empty-text">ask a question to begin</div>
      </div>
    </div>
  </main>

</div>

<script>
const API = 'http://localhost:8000';
let currentChart = null;

// ── Load sample questions ──────────────────────────────────────────────────
async function loadSamples() {
  try {
    const res = await fetch(`${API}/sample-questions`);
    const data = await res.json();
    const list = document.getElementById('sampleList');
    list.innerHTML = data.questions.map(q =>
      `<button class="sample-btn" onclick="useQuestion(this)">${q}</button>`
    ).join('');
  } catch(e) {}
}

function useQuestion(btn) {
  document.getElementById('queryInput').value = btn.textContent;
  submitQuery();
}

// ── Submit query ───────────────────────────────────────────────────────────
async function submitQuery(overrideQuestion) {
  const input = document.getElementById('queryInput');
  const question = overrideQuestion || input.value.trim();
  if (!question) return;

  const btn = document.getElementById('askBtn');
  btn.disabled = true;

  const evaluate = document.getElementById('evalToggle').checked;

  const results = document.getElementById('results');
  results.innerHTML = `
    <div class="loader">
      <div class="dots"><span></span><span></span><span></span></div>
      Querying database...
    </div>`;

  try {
    const res = await fetch(`${API}/query`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question, evaluate })
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || 'Request failed');
    }

    const data = await res.json();
    renderResponse(data);

  } catch(e) {
    results.innerHTML = `
      <div class="card">
        <div class="card-header">
          <div class="card-dot" style="background:var(--red)"></div>
          <div class="card-title">Error</div>
        </div>
        <div class="card-body">
          <div style="color:var(--red);font-family:var(--mono);font-size:13px">${e.message}</div>
        </div>
      </div>`;
  } finally {
    btn.disabled = false;
  }
}

// ── Render response ────────────────────────────────────────────────────────
function renderResponse(data) {
  if (currentChart) { currentChart.destroy(); currentChart = null; }

  const results = document.getElementById('results');
  let html = '';

  // Clarification needed
  if (data.clarification_needed) {
    html += `
      <div class="card">
        <div class="card-header">
          <div class="card-dot" style="background:var(--amber)"></div>
          <div class="card-title">Clarification Needed</div>
        </div>
        <div class="card-body">
          <div class="clarify-text">${data.clarification_question}</div>
          <input class="clarify-input" id="clarifyInput" placeholder="Your answer..."/>
          <button class="clarify-submit" onclick="submitClarification()">Submit</button>
        </div>
      </div>`;
    results.innerHTML = html;
    return;
  }

  // Answer
  if (data.answer) {
    html += `
      <div class="card">
        <div class="card-header">
          <div class="card-dot" style="background:var(--accent2)"></div>
          <div class="card-title">Answer</div>
        </div>
        <div class="card-body">
          <div class="answer-text">${data.answer}</div>
        </div>
      </div>`;
  }

  // Chart placeholder
  if (data.chart_config) {
    html += `
      <div class="card">
        <div class="card-header">
          <div class="card-dot" style="background:var(--accent)"></div>
          <div class="card-title">Visualization</div>
        </div>
        <div class="card-body">
          <div class="chart-wrap"><canvas id="resultChart"></canvas></div>
        </div>
      </div>`;
  }

  // SQL query
  if (data.sql_query) {
    html += `
      <div class="card">
        <div class="card-header">
          <div class="card-dot" style="background:var(--green)"></div>
          <div class="card-title">Generated SQL</div>
        </div>
        <div class="card-body">
          <pre class="sql-code">${escapeHtml(data.sql_query)}</pre>
        </div>
      </div>`;
  }

  // Raw data table
  if (data.sql_results && data.sql_results.length > 0) {
    const cols = Object.keys(data.sql_results[0]);
    html += `
      <div class="card">
        <div class="card-header">
          <div class="card-dot" style="background:var(--muted)"></div>
          <div class="card-title">Raw Data — ${data.sql_results.length} rows</div>
        </div>
        <div class="card-body" style="padding:0;overflow-x:auto">
          <table class="result-table">
            <thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead>
            <tbody>
              ${data.sql_results.map(row =>
                `<tr>${cols.map(c=>`<td>${row[c] ?? ''}</td>`).join('')}</tr>`
              ).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
  }

  // RAGAS evaluation
  if (data.evaluation) {
    const metrics = [
      { key: 'faithfulness',       label: 'Faithfulness' },
      { key: 'answer_relevancy',   label: 'Answer Relevancy' },
      { key: 'context_precision',  label: 'Context Precision' },
      { key: 'context_recall',     label: 'Context Recall' },
    ];
    const metricHtml = metrics
      .filter(m => data.evaluation[m.key] !== null && data.evaluation[m.key] !== undefined)
      .map(m => {
        const val = data.evaluation[m.key];
        const cls = val >= 0.7 ? 'score-high' : val >= 0.4 ? 'score-mid' : 'score-low';
        return `
          <div class="eval-metric">
            <div class="eval-metric-name">${m.label}</div>
            <div class="eval-score ${cls}">${(val * 100).toFixed(0)}%</div>
          </div>`;
      }).join('');

    html += `
      <div class="card">
        <div class="card-header">
          <div class="card-dot" style="background:var(--amber)"></div>
          <div class="card-title">RAGAS Evaluation</div>
        </div>
        <div class="card-body">
          <div class="eval-grid">${metricHtml}</div>
        </div>
      </div>`;
  }

  results.innerHTML = html;

  // Render chart after DOM update
  if (data.chart_config) {
    const ctx = document.getElementById('resultChart');
    if (ctx) {
      Chart.defaults.color = '#94a3b8';
      Chart.defaults.borderColor = '#252a38';
      currentChart = new Chart(ctx, {
        ...data.chart_config,
        options: {
          ...data.chart_config.options,
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            ...data.chart_config.options?.plugins,
            legend: { labels: { color: '#e2e8f0' } },
          },
          scales: data.chart_config.type !== 'pie' && data.chart_config.type !== 'doughnut' ? {
            x: { ticks: { color: '#64748b' }, grid: { color: '#1a1e2a' } },
            y: { ticks: { color: '#64748b' }, grid: { color: '#1a1e2a' } }
          } : undefined
        }
      });
    }
  }
}

function submitClarification() {
  const val = document.getElementById('clarifyInput')?.value?.trim();
  const orig = document.getElementById('queryInput').value;
  if (val) submitQuery(`${orig} — ${val}`);
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Enter key ──────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  loadSamples();
  document.getElementById('queryInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitQuery();
  });
});
</script>
</body>
</html>
